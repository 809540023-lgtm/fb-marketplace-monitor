<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Marketplace 商品監控系統</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--card2:#1a2332;--border:#1e293b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}

.header{background:linear-gradient(135deg,#111827,#1a2332);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,0.15);color:var(--green);padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.header-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2563eb}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card2);color:var(--text)}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:16px 24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::after{background:var(--blue)}.stat-card.green::after{background:var(--green)}
.stat-card.red::after{background:var(--red)}.stat-card.orange::after{background:var(--orange)}
.stat-card.purple::after{background:var(--purple)}
.stat-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-value{font-size:1.8rem;font-weight:800;line-height:1.2}
.stat-sub{font-size:0.75rem;color:var(--text2);margin-top:4px}

.filter-bar{padding:0 24px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:0.8rem;cursor:pointer;transition:all 0.2s}
.filter-chip:hover,.filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-chip.verdict-high{border-color:var(--red)}.filter-chip.verdict-high.active{background:var(--red)}
.filter-chip.verdict-low{border-color:var(--green)}.filter-chip.verdict-low.active{background:var(--green)}
.filter-chip.verdict-fair{border-color:var(--orange)}.filter-chip.verdict-fair.active{background:var(--orange)}
.search-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:0.85rem;width:200px}
.search-input:focus{outline:none;border-color:var(--blue)}

.sort-bar{padding:0 24px 12px;display:flex;gap:8px;align-items:center}
.sort-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:0.8rem;cursor:pointer}
.sort-select:focus{outline:none;border-color:var(--blue)}
.result-count{font-size:0.8rem;color:var(--text3);margin-left:auto}

.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;padding:0 24px 24px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.2s;position:relative}
.product-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.card-header{display:flex;gap:12px;padding:14px}
.card-img{width:90px;height:90px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.card-img .placeholder{color:var(--text3);font-size:1.5rem}
.card-info{flex:1;min-width:0}
.card-title{font-size:0.9rem;font-weight:600;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.card-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.meta-tag{font-size:0.7rem;padding:2px 8px;border-radius:10px;background:rgba(59,130,246,0.15);color:var(--blue)}
.meta-location{font-size:0.7rem;color:var(--text3)}

.price-compare{display:grid;grid-template-columns:1fr auto 1fr;gap:4px;padding:0 14px 10px;align-items:center}
.price-col{text-align:center}
.price-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.price-val{font-size:1.1rem;font-weight:700;margin-top:2px}
.price-listed{color:var(--text)}
.price-estimated{color:var(--blue)}
.price-arrow{font-size:1.2rem;color:var(--text3)}

.verdict-bar{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
.verdict-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:0.75rem;font-weight:700}
.verdict-high{background:rgba(239,68,68,0.15);color:var(--red)}
.verdict-slightly-high{background:rgba(245,158,11,0.15);color:var(--orange)}
.verdict-fair{background:rgba(16,185,129,0.15);color:var(--green)}
.verdict-slightly-low{background:rgba(59,130,246,0.15);color:var(--blue)}
.verdict-low{background:rgba(139,92,246,0.15);color:var(--purple)}
.verdict-unknown{background:rgba(100,116,139,0.15);color:var(--text3)}
.diff-pct{font-size:0.85rem;font-weight:700}
.diff-positive{color:var(--red)}.diff-negative{color:var(--green)}.diff-neutral{color:var(--text3)}

.condition-bar{height:4px;border-radius:2px;background:var(--border);margin:6px 14px 0;overflow:hidden}
.condition-fill{height:100%;border-radius:2px;transition:width 0.5s}

.analysis-text{font-size:0.72rem;color:var(--text3);padding:6px 14px 10px;line-height:1.4}

.card-actions{padding:0 14px 12px;display:flex;gap:6px}
.card-actions a{font-size:0.75rem;color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;background:rgba(59,130,246,0.1)}
.card-actions a:hover{background:rgba(59,130,246,0.25)}

.charts-section{padding:0 24px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-title{font-size:0.85rem;font-weight:700;margin-bottom:12px;color:var(--text2)}

.dist-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;margin-bottom:8px}
.dist-segment{transition:width 0.5s;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff;min-width:0}
.dist-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}

.kw-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.kw-label{width:80px;font-size:0.75rem;color:var(--text2);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kw-bars{flex:1;display:flex;gap:2px;height:24px}
.kw-bar{border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:600;color:#fff;min-width:30px;white-space:nowrap;overflow:hidden}

.timestamp-bar{padding:12px 24px;text-align:center;font-size:0.72rem;color:var(--text3);border-top:1px solid var(--border)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--text3)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
    .stats-row{grid-template-columns:repeat(2,1fr);padding:12px}
    .product-grid{grid-template-columns:1fr;padding:0 12px 12px}
    .charts-section{grid-template-columns:1fr;padding:0 12px 12px}
    .header{padding:10px 12px;flex-wrap:wrap;gap:8px}
    .stat-value{font-size:1.4rem}
    .filter-bar{padding:0 12px 12px}
    .sort-bar{padding:0 12px 12px}
    .kw-label{width:60px;font-size:0.65rem}
}
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="logo"><i class="bi bi-graph-up-arrow"></i> FB 商品監控系統</div>
        <div class="live-badge"><span class="live-dot"></span>MONITORING</div>
    </div>
    <div class="header-actions">
        <button class="btn btn-ghost" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> 刷新</button>
        <a class="btn btn-blue" href="/api/export" style="text-decoration:none"><i class="bi bi-download"></i> 匯出 CSV</a>
    </div>
</div>

<div class="stats-row" id="statsRow">
    <div class="stat-card blue"><div class="stat-label">總監控商品</div><div class="stat-value" id="sTotalProducts">--</div><div class="stat-sub" id="sKeywordCount">-</div></div>
    <div class="stat-card green"><div class="stat-label">價格偏低 (撿便宜)</div><div class="stat-value" id="sUnderpriced">--</div><div class="stat-sub">低於估價</div></div>
    <div class="stat-card red"><div class="stat-label">價格偏高</div><div class="stat-value" id="sOverpriced">--</div><div class="stat-sub">高於估價</div></div>
    <div class="stat-card orange"><div class="stat-label">價格合理</div><div class="stat-value" id="sFair">--</div><div class="stat-sub">估價 &plusmn;5% 內</div></div>
    <div class="stat-card purple"><div class="stat-label">平均標價 vs 估價</div><div class="stat-value" id="sAvgDiff">--</div><div class="stat-sub" id="sAvgDiffSub">-</div></div>
</div>

<div class="charts-section">
    <div class="chart-card">
        <div class="chart-title"><i class="bi bi-pie-chart"></i> 價格判定分佈</div>
        <div class="dist-bar" id="distBar"></div>
        <div class="dist-legend" id="distLegend"></div>
    </div>
    <div class="chart-card">
        <div class="chart-title"><i class="bi bi-bar-chart"></i> 各類別平均價格比對</div>
        <div id="kwBars"></div>
    </div>
</div>

<div class="filter-bar" id="filterBar">
    <span style="color:var(--text3);font-size:0.8rem;margin-right:4px"><i class="bi bi-funnel"></i> 篩選:</span>
    <button class="filter-chip active" data-kw="" onclick="setKeyword(this,'')">全部</button>
    <!-- keyword chips injected by JS -->
    <span style="color:var(--border);margin:0 4px" id="verdictSep">|</span>
    <button class="filter-chip verdict-low" data-v="偏低" onclick="setVerdict(this,'偏低')">偏低</button>
    <button class="filter-chip verdict-low" data-v="略低" onclick="setVerdict(this,'略低')">略低</button>
    <button class="filter-chip verdict-fair" data-v="合理" onclick="setVerdict(this,'合理')">合理</button>
    <button class="filter-chip verdict-high" data-v="略高" onclick="setVerdict(this,'略高')">略高</button>
    <button class="filter-chip verdict-high" data-v="偏高" onclick="setVerdict(this,'偏高')">偏高</button>
    <input class="search-input" placeholder="搜尋商品名稱..." id="searchBox" oninput="filterProducts()">
</div>

<div class="sort-bar">
    <span style="color:var(--text3);font-size:0.8rem"><i class="bi bi-sort-down"></i> 排序:</span>
    <select class="sort-select" id="sortSelect" onchange="filterProducts()">
        <option value="diff_asc">差異% 低→高 (最便宜優先)</option>
        <option value="diff_desc">差異% 高→低</option>
        <option value="price_asc">標價 低→高</option>
        <option value="price_desc">標價 高→低</option>
        <option value="score_desc">新舊分數 高→低</option>
    </select>
    <span class="result-count" id="resultCount"></span>
</div>

<div class="product-grid" id="productGrid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div><p style="margin-top:12px">載入中...</p></div>
</div>

<div class="timestamp-bar" id="timestampBar"></div>

<script>
// Server-injected initial data
const INIT_PRODUCTS = {{ products | tojson }};
const INIT_STATS = {{ stats | tojson }};
const INIT_KEYWORDS = {{ keywords | tojson }};

let allProducts = INIT_PRODUCTS;
let currentKeyword = '';
let currentVerdict = '';

function init() {
    // Build keyword filter chips
    const sep = document.getElementById('verdictSep');
    INIT_KEYWORDS.forEach(kw => {
        if (!kw) return;
        const btn = document.createElement('button');
        btn.className = 'filter-chip';
        btn.dataset.kw = kw;
        btn.textContent = kw;
        btn.onclick = function() { setKeyword(this, kw); };
        sep.parentElement.insertBefore(btn, sep);
    });

    renderStats(INIT_STATS);
    renderCharts(INIT_STATS);
    filterProducts();
    document.getElementById('timestampBar').textContent =
        '資料更新: ' + (INIT_STATS.timestamp || '').replace('T', ' ') +
        ' | 共 ' + INIT_STATS.total + ' 件商品 | ' + INIT_KEYWORDS.length + ' 個關鍵詞';
}

async function loadData() {
    try {
        const [statsRes, productsRes] = await Promise.all([
            fetch('/api/stats').then(r => r.json()),
            fetch('/api/products').then(r => r.json())
        ]);
        allProducts = productsRes.products;
        renderStats(statsRes);
        renderCharts(statsRes);
        filterProducts();
        document.getElementById('timestampBar').textContent =
            '資料更新: ' + (statsRes.timestamp || '').replace('T', ' ') +
            ' | 共 ' + statsRes.total + ' 件商品';
    } catch (e) {
        console.error('Refresh failed:', e);
    }
}

function renderStats(s) {
    document.getElementById('sTotalProducts').textContent = s.total;
    document.getElementById('sKeywordCount').textContent = Object.keys(s.by_keyword).length + ' 個關鍵詞';
    document.getElementById('sUnderpriced').textContent = s.underpriced_count;
    document.getElementById('sOverpriced').textContent = s.overpriced_count;
    document.getElementById('sFair').textContent = s.fair_count;
    const diff = s.avg_listed - s.avg_estimated;
    const diffPct = s.avg_estimated > 0 ? ((diff / s.avg_estimated) * 100).toFixed(1) : 0;
    document.getElementById('sAvgDiff').textContent = (diffPct > 0 ? '+' : '') + diffPct + '%';
    document.getElementById('sAvgDiffSub').textContent = 'NT$' + s.avg_listed.toLocaleString() + ' vs NT$' + s.avg_estimated.toLocaleString();
}

function renderCharts(s) {
    const verdicts = s.by_verdict;
    const total = Object.values(verdicts).reduce((a,b) => a+b, 0) || 1;
    const colors = {'偏高':'#ef4444','略高':'#f59e0b','合理':'#10b981','略低':'#3b82f6','偏低':'#8b5cf6'};
    const order = ['偏低','略低','合理','略高','偏高'];
    const bar = document.getElementById('distBar');
    const legend = document.getElementById('distLegend');
    bar.innerHTML = ''; legend.innerHTML = '';
    for (const k of order) {
        const v = verdicts[k] || 0;
        if (!v) continue;
        const pct = (v/total*100);
        bar.innerHTML += '<div class="dist-segment" style="width:'+pct+'%;background:'+(colors[k]||'#475569')+'">'+v+'</div>';
        legend.innerHTML += '<div class="legend-item"><span class="legend-dot" style="background:'+(colors[k]||'#475569')+'"></span>'+k+' ('+v+')</div>';
    }

    const kwDiv = document.getElementById('kwBars');
    kwDiv.innerHTML = '';
    const entries = Object.entries(s.by_keyword);
    if (!entries.length) return;
    const maxVal = Math.max(...entries.map(([,v]) => Math.max(v.avg_listed, v.avg_estimated))) || 1;
    // Show top 10 by count
    entries.sort((a,b) => b[1].count - a[1].count);
    const top = entries.slice(0, 10);
    for (const [kw, data] of top) {
        const lw = (data.avg_listed / maxVal * 100).toFixed(0);
        const ew = (data.avg_estimated / maxVal * 100).toFixed(0);
        kwDiv.innerHTML += '<div class="kw-bar-row"><div class="kw-label" title="'+kw+'">'+kw+'</div><div class="kw-bars"><div class="kw-bar" style="width:'+lw+'%;background:var(--text3)">$'+data.avg_listed.toLocaleString()+'</div><div class="kw-bar" style="width:'+ew+'%;background:var(--blue)">$'+data.avg_estimated.toLocaleString()+'</div></div></div>';
    }
    kwDiv.innerHTML += '<div class="dist-legend"><div class="legend-item"><span class="legend-dot" style="background:var(--text3)"></span>平均標價</div><div class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>平均估價</div></div>';
}

function setKeyword(el, kw) {
    currentKeyword = currentKeyword === kw ? '' : kw;
    document.querySelectorAll('.filter-chip[data-kw]').forEach(c => c.classList.toggle('active', c.dataset.kw === currentKeyword));
    if (currentKeyword === '') document.querySelector('.filter-chip[data-kw=""]').classList.add('active');
    filterProducts();
}

function setVerdict(el, v) {
    currentVerdict = currentVerdict === v ? '' : v;
    document.querySelectorAll('.filter-chip[data-v]').forEach(c => c.classList.toggle('active', c.dataset.v === currentVerdict));
    filterProducts();
}

function filterProducts() {
    const q = (document.getElementById('searchBox').value || '').toLowerCase();
    let filtered = allProducts;
    if (currentKeyword) filtered = filtered.filter(p => p.keyword === currentKeyword);
    if (currentVerdict) filtered = filtered.filter(p => p.price_verdict === currentVerdict);
    if (q) filtered = filtered.filter(p => (p.title||'').toLowerCase().includes(q));

    const sort = document.getElementById('sortSelect').value;
    if (sort === 'diff_asc') filtered.sort((a,b) => (a.price_diff_pct||0) - (b.price_diff_pct||0));
    else if (sort === 'diff_desc') filtered.sort((a,b) => (b.price_diff_pct||0) - (a.price_diff_pct||0));
    else if (sort === 'price_asc') filtered.sort((a,b) => (a.listed_price||0) - (b.listed_price||0));
    else if (sort === 'price_desc') filtered.sort((a,b) => (b.listed_price||0) - (a.listed_price||0));
    else if (sort === 'score_desc') filtered.sort((a,b) => (b.condition_score||0) - (a.condition_score||0));

    document.getElementById('resultCount').textContent = '顯示 ' + filtered.length + ' / ' + allProducts.length + ' 件';
    renderGrid(filtered);
}

function getVerdictClass(v) {
    return {'偏高':'verdict-high','略高':'verdict-slightly-high','合理':'verdict-fair','略低':'verdict-slightly-low','偏低':'verdict-low'}[v] || 'verdict-unknown';
}
function getVerdictIcon(v) {
    return {'偏高':'bi-arrow-up-circle-fill','略高':'bi-arrow-up-circle','合理':'bi-check-circle-fill','略低':'bi-arrow-down-circle','偏低':'bi-arrow-down-circle-fill'}[v] || 'bi-question-circle';
}
function getConditionColor(s) {
    if (s >= 8) return 'var(--green)'; if (s >= 6) return 'var(--blue)';
    if (s >= 4) return 'var(--orange)'; return 'var(--red)';
}

function renderGrid(products) {
    const grid = document.getElementById('productGrid');
    if (!products.length) {
        grid.innerHTML = '<div class="loading" style="grid-column:1/-1"><p>沒有符合條件的商品</p></div>';
        return;
    }
    grid.innerHTML = products.map(p => {
        const diffClass = (p.price_diff_pct||0) > 5 ? 'diff-positive' : (p.price_diff_pct||0) < -5 ? 'diff-negative' : 'diff-neutral';
        const condColor = getConditionColor(p.condition_score||0);
        return '<div class="product-card">' +
            '<div class="card-header">' +
                '<div class="card-img"><div class="placeholder"><i class="bi bi-image"></i></div></div>' +
                '<div class="card-info">' +
                    '<div class="card-title">' + (p.title||'') + '</div>' +
                    '<div class="card-meta">' +
                        '<span class="meta-tag">' + (p.keyword||'') + '</span>' +
                        '<span class="meta-location"><i class="bi bi-geo-alt"></i> ' + (p.location||'') + '</span>' +
                    '</div>' +
                    '<div style="margin-top:4px;display:flex;align-items:center;gap:6px">' +
                        '<span style="font-size:0.72rem;color:' + condColor + ';font-weight:600">' + (p.condition||'') + '</span>' +
                        '<span style="font-size:0.65rem;color:var(--text3)">(' + (p.condition_score||0) + '/10)</span>' +
                    '</div>' +
                '</div>' +
            '</div>' +
            '<div class="condition-bar"><div class="condition-fill" style="width:' + ((p.condition_score||0)*10) + '%;background:' + condColor + '"></div></div>' +
            '<div class="price-compare">' +
                '<div class="price-col"><div class="price-label">賣家標價</div><div class="price-val price-listed">NT$' + (p.listed_price||0).toLocaleString() + '</div></div>' +
                '<div class="price-arrow"><i class="bi bi-arrow-right"></i></div>' +
                '<div class="price-col"><div class="price-label">AI 估價</div><div class="price-val price-estimated">NT$' + (p.estimated_price||0).toLocaleString() + '</div></div>' +
            '</div>' +
            '<div class="verdict-bar">' +
                '<div class="verdict-badge ' + getVerdictClass(p.price_verdict) + '"><i class="bi ' + getVerdictIcon(p.price_verdict) + '"></i> ' + (p.price_verdict||'') + '</div>' +
                '<div class="diff-pct ' + diffClass + '">' + ((p.price_diff_pct||0) > 0 ? '+' : '') + (p.price_diff_pct||0) + '%</div>' +
            '</div>' +
            '<div class="analysis-text">' + (p.analysis||'') + '</div>' +
            '<div class="card-actions"><a href="' + (p.url||'#') + '" target="_blank"><i class="bi bi-facebook"></i> 查看商品</a></div>' +
        '</div>';
    }).join('');
}

// Auto refresh every 60s
init();
setInterval(loadData, 60000);
</script>
</body>
</html>
