<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--card2:#1a2332;--border:#1e293b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#111827,#1a2332);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,0.15);color:var(--green);padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2563eb}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card2)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:16px 24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::after{background:var(--blue)}.stat-card.green::after{background:var(--green)}.stat-card.red::after{background:var(--red)}.stat-card.orange::after{background:var(--orange)}.stat-card.purple::after{background:var(--purple)}
.stat-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-value{font-size:1.8rem;font-weight:800}.stat-sub{font-size:0.75rem;color:var(--text2);margin-top:4px}
.filter-bar{padding:0 24px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:0.8rem;cursor:pointer;transition:all 0.2s}
.filter-chip:hover,.filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-chip.verdict-high{border-color:var(--red)}.filter-chip.verdict-high.active{background:var(--red)}
.filter-chip.verdict-low{border-color:var(--green)}.filter-chip.verdict-low.active{background:var(--green)}
.filter-chip.verdict-fair{border-color:var(--orange)}.filter-chip.verdict-fair.active{background:var(--orange)}
.search-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:0.85rem;width:200px}
.sort-bar{padding:0 24px 12px;display:flex;gap:8px;align-items:center}
.sort-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:0.8rem}
.result-count{font-size:0.8rem;color:var(--text3);margin-left:auto}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;padding:0 24px 24px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.2s}
.product-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.card-header{display:flex;gap:12px;padding:14px}
.card-img{width:90px;height:90px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-title{font-size:0.9rem;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.meta-tag{font-size:0.7rem;padding:2px 8px;border-radius:10px;background:rgba(59,130,246,0.15);color:var(--blue)}
.meta-location{font-size:0.7rem;color:var(--text3)}
.price-compare{display:grid;grid-template-columns:1fr auto 1fr;gap:4px;padding:0 14px 10px;align-items:center}
.price-col{text-align:center}.price-label{font-size:0.65rem;color:var(--text3)}.price-val{font-size:1.1rem;font-weight:700;margin-top:2px}
.price-listed{color:var(--text)}.price-estimated{color:var(--blue)}.price-arrow{font-size:1.2rem;color:var(--text3)}
.verdict-bar{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
.verdict-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:0.75rem;font-weight:700}
.verdict-high{background:rgba(239,68,68,0.15);color:var(--red)}.verdict-slightly-high{background:rgba(245,158,11,0.15);color:var(--orange)}.verdict-fair{background:rgba(16,185,129,0.15);color:var(--green)}.verdict-slightly-low{background:rgba(59,130,246,0.15);color:var(--blue)}.verdict-low{background:rgba(139,92,246,0.15);color:var(--purple)}
.diff-pct{font-size:0.85rem;font-weight:700}.diff-positive{color:var(--red)}.diff-negative{color:var(--green)}.diff-neutral{color:var(--text3)}
.condition-bar{height:4px;border-radius:2px;background:var(--border);margin:6px 14px 0;overflow:hidden}
.condition-fill{height:100%;border-radius:2px}
.analysis-text{font-size:0.72rem;color:var(--text3);padding:6px 14px 10px;line-height:1.4}
.card-actions{padding:0 14px 12px}.card-actions a{font-size:0.75rem;color:var(--blue);text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;background:rgba(59,130,246,0.1)}
.charts-section{padding:0 24px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-title{font-size:0.85rem;font-weight:700;margin-bottom:12px;color:var(--text2)}
.dist-bar{display:flex;height:28px;border-radius:6px;overflow:hidden}.dist-segment{display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff}
.dist-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}.legend-item{display:flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--text2)}.legend-dot{width:8px;height:8px;border-radius:50%}
.kw-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}.kw-label{width:70px;font-size:0.8rem;color:var(--text2);text-align:right;flex-shrink:0}.kw-bars{flex:1;display:flex;gap:2px;height:24px}.kw-bar{border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:600;color:#fff;min-width:30px}
.timestamp-bar{padding:8px 24px;text-align:center;font-size:0.72rem;color:var(--text3)}
@media(max-width:768px){.stats-row{grid-template-columns:repeat(2,1fr);padding:12px}.product-grid{grid-template-columns:1fr;padding:0 12px 12px}.charts-section{grid-template-columns:1fr;padding:0 12px 12px}.header{padding:10px 12px;flex-wrap:wrap;gap:8px}.stat-value{font-size:1.4rem}.filter-bar,.sort-bar{padding:0 12px 12px}}
</style></head><body>

<div class="sort-bar"><span style="color:var(--text3);font-size:0.8rem"><i class="bi bi-sort-down"></i></span><select class="sort-select" id="sortSel" onchange="filter()"><option value="da">差異% 低→高</option><option value="dd">差異% 高→低</option><option value="pa">標價 低→高</option><option value="pd">標價 高→低</option><option value="sd">分數 高→低</option></select><span class="result-count" id="rc"></span></div>

const allProducts=P.map(p=>({title:p.t,keyword:p.k,location:p.l,listed_price:p.lp,estimated_price:p.ep,price_diff_pct:p.d,price_verdict:p.v,condition:p.c,condition_score:p.s,url:p.u,analysis:"規則推算"}));
let curKW='',curV='';
function init(){
  const total=allProducts.length;
  const under=allProducts.filter(p=>['偏低','略低'].includes(p.price_verdict)).length;
  const over=allProducts.filter(p=>['偏高','略高'].includes(p.price_verdict)).length;
  const fair=allProducts.filter(p=>p.price_verdict==='合理').length;
  const avgL=Math.round(allProducts.reduce((a,p)=>a+p.listed_price,0)/total);
  const avgE=Math.round(allProducts.reduce((a,p)=>a+p.estimated_price,0)/total);
  const diffPct=avgE>0?((avgL-avgE)/avgE*100).toFixed(1):0;
  document.getElementById('sT').textContent=total;
  document.getElementById('sU').textContent=under;
  document.getElementById('sO').textContent=over;
  document.getElementById('sF').textContent=fair;
  document.getElementById('sD').textContent=(diffPct>0?'+':'')+diffPct+'%';
  document.getElementById('sDsub').textContent='NT$'+avgL.toLocaleString()+' vs NT$'+avgE.toLocaleString();
  // Verdict dist
  const vd={'偏低':0,'略低':0,'合理':0,'略高':0,'偏高':0};
  allProducts.forEach(p=>{if(vd[p.price_verdict]!==undefined)vd[p.price_verdict]++});
  const colors={'偏高':'#ef4444','略高':'#f59e0b','合理':'#10b981','略低':'#3b82f6','偏低':'#8b5cf6'};
  const bar=document.getElementById('distBar'),leg=document.getElementById('distLeg');
  bar.innerHTML='';leg.innerHTML='';
  ['偏低','略低','合理','略高','偏高'].forEach(k=>{
    if(!vd[k])return;
    const pct=vd[k]/total*100;
    bar.innerHTML+='<div class="dist-segment" style="width:'+pct+'%;background:'+(colors[k]||'#475569')+'">'+vd[k]+'</div>';
    leg.innerHTML+='<div class="legend-item"><span class="legend-dot" style="background:'+(colors[k]||'#475569')+'"></span>'+k+' ('+vd[k]+')</div>';
  });
  // KW bars
  const kwMap={};
  allProducts.forEach(p=>{
    if(!kwMap[p.keyword])kwMap[p.keyword]={n:0,tl:0,te:0};
    kwMap[p.keyword].n++;kwMap[p.keyword].tl+=p.listed_price;kwMap[p.keyword].te+=p.estimated_price;
  });
  const kwDiv=document.getElementById('kwBars');kwDiv.innerHTML='';
  const mx=Math.max(...Object.values(kwMap).map(v=>Math.max(v.tl/v.n,v.te/v.n)));
  Object.entries(kwMap).forEach(([kw,d])=>{
    const al=Math.round(d.tl/d.n),ae=Math.round(d.te/d.n);
    kwDiv.innerHTML+='<div class="kw-bar-row"><div class="kw-label">'+kw+'</div><div class="kw-bars"><div class="kw-bar" style="width:'+(al/mx*100)+'%;background:var(--text3)">$'+al.toLocaleString()+'</div><div class="kw-bar" style="width:'+(ae/mx*100)+'%;background:var(--blue)">$'+ae.toLocaleString()+'</div></div></div>';
  });
  kwDiv.innerHTML+='<div class="dist-legend"><div class="legend-item"><span class="legend-dot" style="background:var(--text3)"></span>標價</div><div class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>估價</div></div>';
  document.getElementById('ts').textContent='資料更新: 2026-03-17 | 共'+total+'件 | 水槽、臥櫃冰箱、製冰機';
  filter();
}
function setKW(el,kw){curKW=curKW===kw?'':kw;document.querySelectorAll('.filter-chip[data-kw]').forEach(c=>c.classList.toggle('active',c.dataset.kw===curKW));if(!curKW)document.querySelector('.filter-chip[data-kw=""]').classList.add('active');filter()}
function setV(el,v){curV=curV===v?'':v;document.querySelectorAll('.filter-chip[data-v]').forEach(c=>c.classList.toggle('active',c.dataset.v===curV));filter()}
function filter(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  let f=allProducts;
  if(curKW)f=f.filter(p=>p.keyword===curKW);
  if(curV)f=f.filter(p=>p.price_verdict===curV);
  if(q)f=f.filter(p=>p.title.toLowerCase().includes(q));
  const s=document.getElementById('sortSel').value;
  if(s==='da')f.sort((a,b)=>a.price_diff_pct-b.price_diff_pct);
  else if(s==='dd')f.sort((a,b)=>b.price_diff_pct-a.price_diff_pct);
  else if(s==='pa')f.sort((a,b)=>a.listed_price-b.listed_price);
  else if(s==='pd')f.sort((a,b)=>b.listed_price-a.listed_price);
  else if(s==='sd')f.sort((a,b)=>b.condition_score-a.condition_score);
  document.getElementById('rc').textContent='顯示'+f.length+'/'+allProducts.length+'件';
  renderGrid(f);
}
function vc(v){return{'偏高':'verdict-high','略高':'verdict-slightly-high','合理':'verdict-fair','略低':'verdict-slightly-low','偏低':'verdict-low'}[v]||''}
function vi(v){return{'偏高':'bi-arrow-up-circle-fill','略高':'bi-arrow-up-circle','合理':'bi-check-circle-fill','略低':'bi-arrow-down-circle','偏低':'bi-arrow-down-circle-fill'}[v]||'bi-question-circle'}
function cc(s){return s>=8?'var(--green)':s>=6?'var(--blue)':s>=4?'var(--orange)':'var(--red)'}
function renderGrid(ps){
  const g=document.getElementById('grid');
  if(!ps.length){g.innerHTML='<p style="text-align:center;color:var(--text3);padding:40px;grid-column:1/-1">沒有符合條件的商品</p>';return}
  g.innerHTML=ps.map(p=>{
    const dc=p.price_diff_pct>5?'diff-positive':p.price_diff_pct<-5?'diff-negative':'diff-neutral';
    const co=cc(p.condition_score);
    return '<div class="product-card"><div class="card-header"><div class="card-img"><i class="bi bi-image" style="color:var(--text3);font-size:1.5rem"></i></div><div class="card-info"><div class="card-title">'+p.title+'</div><div class="card-meta"><span class="meta-tag">'+p.keyword+'</span><span class="meta-location"><i class="bi bi-geo-alt"></i> '+p.location+'</span></div><div style="margin-top:4px;font-size:0.72rem;color:'+co+';font-weight:600">'+p.condition+' ('+p.condition_score+'/10)</div></div></div><div class="condition-bar"><div class="condition-fill" style="width:'+(p.condition_score*10)+'%;background:'+co+'"></div></div><div class="price-compare"><div class="price-col"><div class="price-label">賣家標價</div><div class="price-val price-listed">NT$'+p.listed_price.toLocaleString()+'</div></div><div class="price-arrow"><i class="bi bi-arrow-right"></i></div><div class="price-col"><div class="price-label">AI估價</div><div class="price-val price-estimated">NT$'+p.estimated_price.toLocaleString()+'</div></div></div><div class="verdict-bar"><div class="verdict-badge '+vc(p.price_verdict)+'"><i class="bi '+vi(p.price_verdict)+'"></i> '+p.price_verdict+'</div><div class="diff-pct '+dc+'">'+(p.price_diff_pct>0?'+':'')+p.price_diff_pct+'%</div></div><div class="card-actions"><a href="'+p.url+'" target="_blank"><i class="bi bi-facebook"></i> 查看商品</a></div></div>';
  }).join('');
}
function exportCSV(){
  let csv='關鍵詞,商品名稱,標價,AI估價,差異%,判定,新舊,分數,地點,連結\n';
  allProducts.forEach(p=>{csv+=p.keyword+',"'+p.title.replace(/"/g,'""')+'",'+p.listed_price+','+p.estimated_price+','+p.price_diff_pct+'%,'+p.price_verdict+','+p.condition+','+p.condition_score+','+p.location+','+p.url+'\n'});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='marketplace_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
init();
